packages:
  # Core (zero-dep web components) + agnostic agent engine
  - 'packages/core'
  - 'packages/engine'

  # Locales, LLM providers, blessed plugins, framework wrappers
  - 'packages/locales/*'
  - 'packages/providers/*/*'
  - 'packages/plugins/*'
  - 'packages/wrappers/*'

  # Apps: docs (Starlight), playgrounds (one runnable example per framework)
  - 'apps/*'
  - 'apps/playgrounds/*'

  # Browser smoke E2E (Playwright) — drives the playgrounds in a real browser
  - 'e2e'
