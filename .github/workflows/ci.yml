name: ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Superseded pushes to the same ref cancel their in-flight run instead of
# queuing (main is never cancelled — its group is keyed by the unique SHA).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.sha || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        # version is read from the packageManager field in package.json

      - name: Use Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      # Publish-safety: publint (all 15 packages) + are-the-types-wrong (the 12
      # non-SFC/APF packages; angular/svelte/vue carry an inherent attw node16
      # limitation for their .svelte/.vue/APF type entrypoints — publint still
      # covers them).
      - name: Check packaging
        run: pnpm check-packaging

      - name: Test
        run: pnpm test

      # Added as packages land: docs build + link-check.

  # Portability guard: the packages declare engines.node ">=18" and the repo is
  # developed on Windows, yet the authoritative gate above runs a single target.
  # This job re-runs build + test across the supported Node range and on Windows
  # so an incompatibility can't ship undetected. (Node 24 + the full lint/
  # typecheck/packaging gate stay on the `ci` job to avoid duplicating them.)
  test-matrix:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        node: ['18', '20', '22']
        include:
          - os: windows-latest
            node: '22'
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Use Node.js ${{ matrix.node }}
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  # Browser smoke E2E — drives every playground in a real browser against a
  # network-mocked model (no key/LM Studio). Separate job: it boots six dev
  # servers + a browser, so it is heavier and isolated from the fast gate above.
  e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Use Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # demo-vanilla consumes @aparte/core from its dist, so the packages must be
      # built before the E2E dev servers boot.
      - name: Build
        run: pnpm build

      - name: Install Playwright (Chromium + OS deps)
        run: pnpm --filter @aparte-workspace/e2e exec playwright install --with-deps chromium

      - name: Browser smoke E2E
        run: pnpm e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
